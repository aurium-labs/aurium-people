name: Release

# Publishes to PyPI via Trusted Publishing (OIDC) when a v* tag is pushed.
# Requires a "pending publisher" registered on PyPI pointing at:
#   owner: aurium-labs, repo: aurium-people, workflow: release.yml, environment: pypi
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Build package
        run: uv build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi # must match the environment named in the PyPI trusted publisher
    permissions:
      id-token: write # required for OIDC trusted publishing
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
